server:
  port: 8080
spring:
  application:
    name: "ms-restaurant"
  devtools:
    add-properties: false
  datasource:
    url: "jdbc:postgresql://localhost:5432/ms_restaurant"
    username: "postgres"
    password: 1234
    driver-class-name: "org.postgresql.Driver"
  jpa:
    database-platform: "org.hibernate.dialect.PostgreSQLDialect"
    hibernate:
      ddl-auto: "none"
    show-sql: true
    properties:
      hibernate:
        format_sql: true
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
adapter:
  restconsumer:
    user-url: "http://localhost:8090"
